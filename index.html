<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ulam for Today 🍲</title>
    <style>
        :root {
            --primary: #ff4757;
            --secondary: #ffa502;
            --dark: #2f3542;
            --light: #f1f2f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light);
            color: var(--dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 5px;
        }

        p.subtitle {
            color: #747d8c;
            margin-bottom: 25px;
        }

        .result-card {
            margin-top: 10px;
            padding: 25px;
            border-radius: 15px;
            background: #fff;
            border: 2px solid #f1f2f6;
            text-align: left;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.92) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .dish-name {
            font-size: 1.8rem;
            color: var(--dark);
            font-weight: bold;
            margin-bottom: 5px;
            text-align: center;
        }

        .dish-tag {
            display: inline-block;
            background: #ffeaa7;
            color: #d63031;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .tag-container {
            text-align: center;
        }

        .section-title {
            font-size: 1.1rem;
            color: var(--primary);
            margin-bottom: 8px;
            font-weight: bold;
        }

        .ingredients, .description {
            margin-bottom: 20px;
            font-size: 1rem;
            line-height: 1.5;
        }

        .sparkle {
            position: absolute;
            background: var(--secondary);
            border-radius: 50%;
            pointer-events: none;
            animation: shoot 0.6s ease-out forwards;
            opacity: 0;
        }

        @keyframes shoot {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--mx), var(--my)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <h1>Ulam for Today 🍲</h1>
        <p class="subtitle"></p>
        
        <div class="result-card">
            <div class="dish-name" id="dishName">-</div>
            <div class="tag-container">
                <span class="dish-tag" id="dishTag">-</span>
            </div>
            
            <div class="section-title">💡 Why you should eat this today:</div>
            <p class="description" id="dishDesc">-</p>
            
            <div class="section-title">🛒 Key Ingredients Needed:</div>
            <p class="ingredients" id="dishIngredients">-</p>
        </div>
    </div>

        ];
        
        function getDishForToday() {
            const today = new Date();
            const dateIdentifier = (today.getFullYear() * 10000) + ((today.getMonth() + 1) * 100) + today.getDate();
            const index = dateIdentifier % ulamDatabase.length;
            return ulamDatabase[index];
        }
        
        function createSparkles() {
            const container = document.getElementById('mainContainer');
            
            for (let i = 0; i < 20; i++) {
                const sparkle = document.createElement('div');
                sparkle.classList.add('sparkle');
                
                const size = Math.random() * 6 + 4;
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 80 + 40;
                
                sparkle.style.width = `${size}px`;
                sparkle.style.height = `${size}px`;
                sparkle.style.left = '50%';
                sparkle.style.top = '40%';
                
                sparkle.style.setProperty('--mx', `${Math.cos(angle) * distance}px`);
                sparkle.style.setProperty('--my', `${Math.sin(angle) * distance}px`);
                
                container.appendChild(sparkle);
                
                setTimeout(() => {
                    sparkle.remove();
                }, 600);
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            const todaysDish = getDishForToday();
            
            document.getElementById('dishName').innerText = todaysDish.name;
            document.getElementById('dishTag').innerText = todaysDish.tag;
            document.getElementById('dishDesc').innerText = todaysDish.desc;
            document.getElementById('dishIngredients').innerText = todaysDish.ingredients;
            
            createSparkles();
        });
        
    </script>
</body>
</html>
